name: CI

# Runs on every branch and pull request.
on:
  push:
    branches: ['**']
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Portability tracker: the pure-Rust library builds and its tests (doctests)
  # pass on every platform. No C toolchain is involved (build.rs is a no-op
  # without `cref`), so this guards against platform-specific regressions.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked

  # Bit-exactness gate: diff the Rust deflate against the vendored zlib 1.3.1,
  # compiled by cc. zlib's deflate is integer-only and deterministic, so the
  # byte-for-byte comparison holds on any platform; we run it on Linux. Release
  # mode keeps the differential corpus quick. `--locked`: the committed
  # Cargo.lock pins the build toolchain (cc); CI must use it verbatim and fail
  # on drift.
  differential:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --release --locked --features cref

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --locked --all-targets --features cref -- -D warnings
      - run: cargo doc --locked --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
