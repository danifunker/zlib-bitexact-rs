name: CI

# Runs on every branch and pull request.
on:
  push:
    branches: ['**']
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Pure-Rust, zero-dependency crate. Building + running the byte-exact
  # golden-vector test (tests/golden.rs) on every platform is the bit-exactness
  # gate: deflate_raw must reproduce the committed zlib-1.3.1 vectors everywhere.
  # No C toolchain, no build script. `--locked`: CI uses the committed Cargo.lock
  # verbatim and fails on drift.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --locked --all-targets -- -D warnings
      - run: cargo doc --locked --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
